name: Send Telegram Message
description: Send a message via Telegram Bot API

inputs:
  bot-token:
    description: Telegram bot token
    required: true
  chat-id:
    description: Telegram chat ID
    required: true
  message:
    description: Message text to send
    required: true

runs:
  using: composite
  steps:
    - shell: bash
      env:
        TG_BOT_TOKEN: ${{ inputs.bot-token }}
        TG_CHAT_ID: ${{ inputs.chat-id }}
        TG_MESSAGE: ${{ inputs.message }}
      run: |
        curl -sf -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
          -H "Content-Type: application/json" \
          -d "$(python3 -c "
        import json, os
        print(json.dumps({
            'chat_id': int(os.environ['TG_CHAT_ID']),
            'text': os.environ['TG_MESSAGE'],
            'parse_mode': 'Markdown'
        }))
        ")" || echo "Telegram send failed"
