name: Gmail Lifecycle Check
description: Detect Gmail draft lifecycle signals (deleted / sent-as-is / sent-edited / team-handled / stale) from the outstanding-drafts ledger and append them to the learnings files.

inputs:
  credentials-path:
    description: Path to Gmail OAuth credentials JSON file
    required: true
  drafts-ledger-path:
    description: Path to drafts-outstanding.md ledger (relative to repo root)
    required: false
    default: business/intelligence/emails/drafts-outstanding.md
  gmail-rules-path:
    description: Path to gmail-rules.md — source of Send-as identities + Team domains sections
    required: false
    default: business/intelligence/gmail-rules.md
  classify-learnings-path:
    description: Path to gmail-classify-learnings.md — receives deleted / team-handled / stale signals
    required: false
    default: business/intelligence/gmail-classify-learnings.md
  draft-learnings-path:
    description: Path to gmail-draft-learnings.md — receives sent-as-is / sent-edited signals
    required: false
    default: business/intelligence/gmail-draft-learnings.md
  stale-days:
    description: Days a live draft may sit with no reply before being logged as stale
    required: false
    default: "14"

runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: "22"

    - name: Run lifecycle check
      shell: bash
      env:
        GMAIL_CREDENTIALS_PATH: ${{ inputs.credentials-path }}
        ACTION_PATH: ${{ github.action_path }}
        DRAFTS_LEDGER_PATH: ${{ inputs.drafts-ledger-path }}
        GMAIL_RULES_PATH: ${{ inputs.gmail-rules-path }}
        CLASSIFY_LEARNINGS_PATH: ${{ inputs.classify-learnings-path }}
        DRAFT_LEARNINGS_PATH: ${{ inputs.draft-learnings-path }}
        STALE_DAYS: ${{ inputs.stale-days }}
      run: |
        node "${ACTION_PATH}/dist/gmail-lifecycle-check.mjs"
