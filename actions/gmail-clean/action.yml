name: Gmail Clean
description: Execute triage actions on Gmail messages (archive, star, label, delete, etc.)

inputs:
  credentials-path:
    description: Path to Gmail OAuth credentials JSON file
    required: true
  triage-json:
    description: Path to triage JSON file with actions to execute
    required: true
  dry-run:
    description: Run without making API calls
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: "22"

    - name: Run cleanup
      shell: bash
      env:
        GMAIL_CREDENTIALS_PATH: ${{ inputs.credentials-path }}
        ACTION_PATH: ${{ github.action_path }}
        TRIAGE_JSON: ${{ inputs.triage-json }}
        DRY_RUN: ${{ inputs.dry-run }}
      run: |
        FLAGS=""
        if [ "$DRY_RUN" = "true" ]; then FLAGS="--dry-run"; fi
        node "${ACTION_PATH}/dist/gmail-clean.mjs" "${TRIAGE_JSON}" $FLAGS
