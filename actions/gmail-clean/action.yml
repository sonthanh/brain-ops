name: Gmail Clean
description: Execute triage actions on Gmail messages (archive, star, label, delete, etc.)

inputs:
  credentials-path:
    description: Path to Gmail OAuth credentials JSON file
    required: true
  triage-json:
    description: Path to triage JSON file with actions to execute
    required: true
  dry-run:
    description: Run without making API calls
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: "22"

    - name: Run cleanup
      shell: bash
      env:
        GMAIL_CREDENTIALS_PATH: ${{ inputs.credentials-path }}
      run: |
        node ${{ github.action_path }}/dist/gmail-clean.mjs "${{ inputs.triage-json }}" ${{ inputs.dry-run == 'true' && '--dry-run' || '' }}
