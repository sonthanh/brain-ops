name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ci-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    outputs:
      dangerous: ${{ steps.danger.outputs.dangerous }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build (verify bundles compile)
        run: bun run build

      - name: Lint GitHub Actions
        uses: docker://rhysd/actionlint:latest
        with:
          args: -color

      - name: Danger scan
        id: danger
        run: |
          DANGEROUS=false
          if git diff origin/main...HEAD -- 'src/**' | grep -qE 'messages\.delete|messages\.batchDelete|batchDelete'; then
            echo "::warning::PR contains bulk delete operations"
            DANGEROUS=true
          fi
          if git diff origin/main...HEAD -- 'src/**' | grep -qE 'scope.*gmail\.(modify|settings|compose)'; then
            echo "::warning::PR adds new Gmail API scopes"
            DANGEROUS=true
          fi
          echo "dangerous=$DANGEROUS" >> "$GITHUB_OUTPUT"

      - name: Label dangerous PRs
        if: steps.danger.outputs.dangerous == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['needs-human-review']
            });

  auto-merge:
    needs: gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && needs.gate.outputs.dangerous != 'true'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check for human review label
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const needsReview = labels.some(l => l.name === 'needs-human-review');
            core.setOutput('blocked', needsReview ? 'true' : 'false');

      - name: Auto-merge
        if: steps.check.outputs.blocked != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              merge_method: 'squash'
            });

  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify on failure
        if: failure()
        uses: sonthanh/brain-ops/actions/telegram-send@v0
        with:
          bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
          message: "Secret scan failed. Check https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
