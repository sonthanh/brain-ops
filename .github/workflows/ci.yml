name: CI

on:
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ci-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    outputs:
      dangerous: ${{ steps.danger.outputs.dangerous }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build (verify bundles compile)
        run: bun run build

      - name: Lint GitHub Actions
        uses: docker://rhysd/actionlint:latest
        with:
          args: -color

      - name: Danger scan
        id: danger
        run: |
          DANGEROUS=false
          if git diff origin/main...HEAD -- 'src/**' | grep -qE 'messages\.delete|messages\.batchDelete|batchDelete'; then
            echo "::warning::PR contains bulk delete operations"
            DANGEROUS=true
          fi
          if git diff origin/main...HEAD -- 'src/**' | grep -qE 'scope.*gmail\.(modify|settings|compose)'; then
            echo "::warning::PR adds new Gmail API scopes"
            DANGEROUS=true
          fi
          echo "dangerous=$DANGEROUS" >> $GITHUB_OUTPUT

      - name: Label dangerous PRs
        if: steps.danger.outputs.dangerous == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['needs-human-review']
            });

  auto-merge:
    needs: gate
    runs-on: ubuntu-latest
    if: needs.gate.outputs.dangerous != 'true'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check for human review label
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const needsReview = labels.some(l => l.name === 'needs-human-review');
            core.setOutput('blocked', needsReview ? 'true' : 'false');

      - name: Auto-merge
        if: steps.check.outputs.blocked != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              merge_method: 'squash'
            });
