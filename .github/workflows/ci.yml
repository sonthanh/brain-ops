name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build (verify bundles compile)
        run: bun run build

      - name: Lint GitHub Actions
        uses: docker://rhysd/actionlint:latest
        with:
          args: -color

      - name: Danger scan
        id: danger
        run: |
          DANGEROUS=false
          # Check for destructive Gmail operations
          if git diff origin/main...HEAD -- 'src/**' | grep -qE 'messages\.delete|messages\.batchDelete|batchDelete'; then
            echo "::warning::PR contains bulk delete operations"
            DANGEROUS=true
          fi
          # Check for new API scope additions
          if git diff origin/main...HEAD -- 'src/**' | grep -qE 'scope.*gmail\.(modify|settings|compose)'; then
            echo "::warning::PR adds new Gmail API scopes"
            DANGEROUS=true
          fi
          echo "dangerous=$DANGEROUS" >> $GITHUB_OUTPUT

      - name: Label dangerous PRs
        if: steps.danger.outputs.dangerous == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['needs-human-review']
            });

  auto-merge:
    needs: gate
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'needs-human-review') }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Auto-merge
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              merge_method: 'squash'
            });
