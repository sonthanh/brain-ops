name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '.claude/**'

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build bundles
        run: bun run build

      - name: Commit bundles if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/actions/*/dist/
          if git diff --cached --quiet; then
            echo "No bundle changes"
          else
            git commit -m "build: update action bundles"
            git push
          fi

      - name: Determine version
        id: version
        run: |
          # Get latest tag
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1 || echo "v0.0.0")
          # Bump patch
          MAJOR=$(echo $LATEST | cut -d. -f1)
          MINOR=$(echo $LATEST | cut -d. -f2)
          PATCH=$(echo $LATEST | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_TAG="${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "New version: $NEW_TAG"

      - name: Create release tag
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Update floating major tag
        run: |
          git tag -f ${{ steps.version.outputs.major }} ${{ steps.version.outputs.tag }}
          git push -f origin ${{ steps.version.outputs.major }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.version.outputs.tag }} \
            --title "${{ steps.version.outputs.tag }}" \
            --generate-notes
